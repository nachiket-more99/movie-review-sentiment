<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <title>CineSense - Sentiment Analysis of Movie Reviews</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="main">

      <nav class="navbar">
        <a class="logo" href="/">CINE<span>SENSE</span></a>
      </nav>

      <div class="main-container">
        {% block content %}

        <div class="section-header">
          <h2 class="section-title">Popular Movies</h2>
          <span class="section-sub">Sentiment-analyzed reviews</span>
        </div>

        <div class="movie">
          <div class="card-container">
            {% for movie in movies.values() %}
            <div
              class="card"
              value="{{ movie.id }}"
              style="background-image: url('https://image.tmdb.org/t/p/w600_and_h900_bestv2/{{ movie.poster_path }}');"
            >
              <div class="card-text">
                <div class="bold">{{ movie.title }}</div>
                <div id="date">{{ movie.release_date }}</div>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>

        {% endblock %}
      </div>
    </div>

    <script>
      document.querySelectorAll(".card").forEach(function (card) {
        card.addEventListener("click", function () {
          const movie_id = card.getAttribute("value");
          window.location.href = "/movie/" + movie_id;
        });
      });
    </script>
  </body>
</html>
